<!DOCTYPE html>
<html>
<head>
<title>Study Plan</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body class="study-container">

<div class="study-card">

<h1>📚 My Study Plan</h1>

<div class="score-circle"
id="score">

0%

</div>

<h3 id="message">

Loading...

</h3>

<a href="/dashboard"
class="back-btn">

⬅ Back to Dashboard

</a>

</div>

<script>

fetch(
'/student/study-plan/data'
)

.then(
res=>res.json()
)

.then(data=>{

document.getElementById(
'score'
).innerText=

data.average+"%";

document.getElementById(
'message'
).innerText=

data.message;

});

</script>

</body>
</html>
