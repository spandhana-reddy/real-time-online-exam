<!DOCTYPE html>
<html>
<head>

<title>Results</title>

<link rel="stylesheet"
href="/css/style.css">

</head>

<body class="dashboard-body">

<div class="dashboard-container">

<h1>
📊 My Results
</h1>

<table class="results-table">

<thead>

<tr>

<th>Exam ID</th>
<th>Score</th>
<th>Date</th>

</tr>

</thead>

<tbody id="resultBody">

</tbody>

</table>

<br>

<a href="/dashboard"
class="back-btn">

⬅ Back to Dashboard

</a>

</div>


<script>

fetch(
'/student/results/data'
)

.then(
res=>res.json()
)

.then(results=>{

const body=

document.getElementById(
'resultBody'
);

body.innerHTML='';


if(results.length===0){

body.innerHTML=`

<tr>

<td colspan="3">

No results available

</td>

</tr>

`;

return;

}


results.forEach(result=>{

body.innerHTML+=`

<tr>

<td>

${result.exam_id}

</td>

<td>

${result.score}

</td>

<td>

${new Date(
result.submitted_at
).toLocaleDateString()}

</td>

</tr>

`;

});

});

</script>

</body>
</html>
